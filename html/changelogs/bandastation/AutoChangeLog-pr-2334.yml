author: "tgstation"
delete-after: True
changes:
  - qol: "Кнопка выхода в меню игры теперь ведет на вторую страницу вместо панели TGUI."
  - qol: "Рецепт для создания MOD soul core больше не нужно изучать."
  - qol: "Теперь можно создавать MOD soul core, используя soul shards."
  - image: "Эмиттеры теперь светятся в темноте."
  - bugfix: "Кристаллы Healium теперь корректно обновляют атмосферу тайла."
  - image: "ГГР теперь светится в темноте."
  - code_imp: "Незначительные оптимизации кода обработки АПЦ."
  - bugfix: "Исправлена ошибка с вмешательством в чат, когда персонажа усыпляли, но он был иммунен к усыплению."
  - code_imp: "Оптимизировано отображение видов и иконок антагонистов в меню предпочтений на локальной версии, что ускоряет время открытия в разработке."
  - bugfix: "GAGS генерация предварительного просмотра карты больше не завершает работу без ошибок вне тестов из-за ошибки компиляции."
  - qol: "Предметы, отправляемые через черный рынок с использованием опции \"запустить\", теперь отправляются через самоуничтожающийся энергетический пузырь, удерживающий предмет(ы)."
  - balance: "Опция \"запустить\" для отправки на черном рынке теперь бесплатная."
  - admin: "Администраторы теперь могут использовать новую команду \"Create Black Market Item\", чтобы добавить любой предмет на черный рынок! Подходит для событий. Попросите вашего администратора попробовать это!"
  - rscdel: "Удалено отображение заклинаний в отдельной вкладке панели статуса."
  - qol: "У способностей ксеноморфов теперь отображается их стоимость при наведении на кнопку действия."
  - bugfix: "Исправлена возможность удаления объектов через туалеты."
  - rscadd: "ИИ теперь может вращать свои голограммы, используя назначенную клавиши \"блокировать движение\"."
  - bugfix: "Исправлена ошибка, из-за которой установка пользовательского шрифта чата создавала проблемы с некоторыми текстовыми элементами, например, роботической речью."
  - rscadd: "Теперь на некоторые бот-модели можно рисовать лица, используя ручку, мелки или краску."
  - rscdel: "Удалены эффекты частиц огня во время горения мобов."
  - rscadd: "Яркость огня моба теперь увеличивается в зависимости от степени его горения — чем больше огня, тем ярче свет."
  - rscadd: "Огонь моба теперь имеет эффект свечения и немного светится."
  - rscadd: "Порог, при котором визуализация человеческого огня переходит из \"маленького\" в \"большой\", увеличен (на 10%)."
  - bugfix: "Исправлен сломанный кадр в анимации огня для обезьяны."
  - bugfix: "Все ксеноморфы теперь используют общую визуализацию для огня."
  - bugfix: "Все ксеноморфы больше не теряют визуализацию огня при отдыхе."
  - bugfix: "Крупные ксеноморфы теперь выравнивают накладываемую анимацию огня в центр своей модели."
  - rscadd: "Теперь можно разворачивать, сворачивать, активировать и деактивировать MODsuit других игроков через меню снятия оборудования."
  - bugfix: "Провода экспериментатора должны теперь работать корректно."
  - bugfix: "Исправлена ошибка, из-за которой пожилой атмосиан подвергался воздействию металлического водорода, из которого он создан."
  - bugfix: "Исправлен случайный текст \"ING IN\" на экране лобби."
  - spellcheck: "Heckacious Larincks больше не использует слово, нарушающее условия обслуживания GitHub, в одном из своих преобразований."
  - balance: "Рыбу теперь можно сканировать для генома-хранилища."
  - balance: "На выполнение генома-хранилища теперь требуется больше животных в среднем."
  - balance: "На выполнение генома-хранилища теперь требуется меньше растений в среднем."
  - code_imp: "Очищен код, связанный с распознаванием реагентов и реакций."
  - code_imp: "Операции переноса и удаления реагентов теперь работают быстрее за счет оптимизации потребления процессорных ресурсов."
  - rscadd: "Добавлен Memory HUD в пользовательский интерфейс. Теперь игрок будет получать воспоминания о происходящем на станции или о важной информации антагонистов, например, о кодах ядер."
  - rscdel: "Удалена кнопка \"хранить\" у борга. Модуль киборга будет теперь работать более схоже с рюкзаком (ЛКМ для хранения, ПКМ для открытия/закрытия)."
  - bugfix: "Борговый материал теперь корректно отображает количество доступных материалов в зависимости от заряда ячейки."
  - qol: "Предпочтения конфигурации HUD теперь применяются к большему количеству мобов."
  - qol: "Улучшен интерфейс HUD для простых базовых животных, киборгов, ИИ, pAI и ксеноморфов."
  - rscadd: "NanoPaint — приложение для рисования для модульных компьютеров — теперь доступно для скачивания. Используйте его для создания новых изображений или редактирования существующих на вашем устройстве."
  - rscadd: "Галактика искусств Marlowe Treeby's теперь позволяет загружать картины на ваше устройство как файлы изображений."
  - rscadd: "Менеджер файлов теперь можно использовать для печати изображений на большинство холстов и фотографических форматов. Печать на холсте возможна только с консоли."
  - qol: "Приложение камеры на ПДА теперь может делать снимки на расстоянии."
  - qol: "Теперь можно сохранять фотографии, сделанные с помощью приложения камеры на ПДА, на свое устройство."
  - qol: "Можно регулировать размер фотографий, сделанных с помощью приложения камеры на ПДА."
  - qol: "Можно изменить название, описание и подпись фотографий, сделанных с помощью приложения камеры на ПДА, до их сохранения на диск или печати в первый раз."
  - bugfix: "Фреймворк Universal Sprite Editor (используемый для холстов NanoPaint) теперь применяет алгоритм Брезенхема для операций карандаша и ластика."
  - bugfix: "Фреймворк Universal Sprite Editor корректно сохраняет иконки."
  - admin: "Изображения, созданные игроками с использованием NanoPaint, будут журналироваться для администраторов и доступны через команду \"Audit Player-made Sprites\"."
  - bugfix: "Исправлены тайлы, которые иногда не добавлялись в содержание зоны."
  - bugfix: "Spy Bootknife теперь корректно активирует proc-ы нанесения ударов, когда экипирован."
  - bugfix: "Исправлена ошибка, из-за которой игра предлагала продавать химические реакции за общественный заказ."
  - admin: "Ваши собственные сообщения через ASay больше не будут активировать ваши выделения в чате."
  - rscadd: "Получите свои бесплатные вращения СЕЙЧАС на вашем местном игровом автомате с новой впечатляющей физически-обоснованной анимацией вращений!"
  - rscadd: "Добавлено действие суицида для shrink ray."
  - qol: "После изучения поведения странного объекта теперь можно переименовать его, используя ручку."